<!DOCTYPE html>
<html lang="en">
<head>

<!-- STEP 1: Firstly  basic HTML Setup -->
<!-- All Group Members: Initial project structure setup -->

<meta charset="UTF-8">
<title>Energy Bowl Builder</title>
<meta charset="UTF-8">
<title>Energy Bowl Builder</title>
<!-- STEP 2: Link CSS File -->
<!--By  Vishal Malhotra -->

<link rel="stylesheet" href="style.css">

</head>

<body>
    <!-- STEP 3: Page Title -->
<!--By  Vishal Malhotra: Improve visual layout and heading design -->

<h1>Build Your Energy Bowl</h1>
<!-- STEP 4: Create Main Order Form -->
<!-- Jaskaran Singh is creating form structure and input fields -->

<form id="bowlForm">

<!-- STEP 5: make a selection of bowl size -->
<label>Bowl Size:</label>
<select id="size">
<option value="Small">Small</option>
<option value="Medium">Medium</option>
<option value="Large">Large</option>
</select>
<!-- STEP 6: make a selection of bowl base -->
<label>Choose Base:</label>
<select id="base">
<option value="Acai">Acai</option>
<option value="Yogurt">Yogurt</option>
<option value="Oatmeal">Oatmeal</option>
<option value="Chia Pudding">Chia Pudding</option>
</select>

<!-- STEP 7: make selection of fruits-->
<!--  Handling checkbox input data --> <!--jaskaran singh-->

<label>Select Fruits:</label><br>

<input type="checkbox" value="Banana" class="fruit"> Banana
<input type="checkbox" value="Strawberry" class="fruit"> Strawberry
<input type="checkbox" value="Blueberry" class="fruit"> Blueberry
<input type="checkbox" value="Apple" class="fruit"> Mango

<br><br>
<!-- STEP 8: select toppings -->

<label>Select Toppings:</label><br>

<input type="checkbox" value="Granola" class="topping"> Granola
<input type="checkbox" value="Coconut Flakes" class="topping"> Coconut Flakes
<input type="checkbox" value="Chia Seeds" class="topping"> Chia Seeds
<input type="checkbox" value="Almonds" class="topping"> Almonds

<br><br>
<!-- STEP 9: Protein Selection -->

<label>Add Protein:</label>
<select id="protein">
<option value="None">None</option>
<option value="Whey Protein">Whey Protein</option>
<option value="Plant Protein">Plant Protein</option>
</select>
<!-- STEP 10: Sweetener Selection -->

<label>Sweetener:</label>
<select id="sweetener">
<option value="Honey">Honey</option>
<option value="Maple Syrup">Maple Syrup</option>
<option value="None">None</option>
</select>
<!-- STEP 11: Special Instructions -->

<label>Special Instructions:</label>
<textarea id="instructions"></textarea>

<br><br>

<!-- STEP 12: Submit Button -->
<!-- Jaskaran Singh: Connect the submit button to JavaScript functionality -->

<button type="submit">Place Order</button>

</form>
<!-- STEP 13: Order Output Section -->


<div id="output"></div>

<!-- STEP 14: Linked JavaScript File -->
<script src="script.js"></script>

</body>
</html>
